name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read
  security-events: write

jobs:

  validate:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Dependencies
        working-directory: app
        run: npm ci

      - name: Run Tests
        working-directory: app
        run: npm test

      - name: Build Docker Image
        run: |
          docker build \
            -t sample-service:test \
            ./app

      - name: Setup Helm
        uses: azure/setup-helm@v4

      - name: Helm Lint
        run: |
          helm lint helm/sample-service

      - name: Helm Template Validation
        run: |
          helm template sample-service \
          helm/sample-service \
          -f helm/sample-service/values-kind.yaml \
          > rendered.yaml

      - name: Run Trivy Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: sample-service:test
          format: table
          severity: CRITICAL,HIGH
          exit-code: 1