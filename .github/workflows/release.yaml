name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write
  packages: write

env:
  IMAGE_NAME: sample-service

jobs:

  release:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract SHA
        id: vars
        run: |
          echo "sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Build Image
        run: |
          docker build \
          -t ghcr.io/${{ github.repository_owner }}/sample-service:${{ steps.vars.outputs.sha }} \
          ./app

      - name: Push Image
        run: |
          docker push \
          ghcr.io/${{ github.repository_owner }}/sample-service:${{ steps.vars.outputs.sha }}

      - name: Update Helm Values
        run: |
          sed -i \
          "s/tag:.*/tag: ${{ steps.vars.outputs.sha }}/" \
          helm/sample-service/values-prod.yaml

      - name: Commit GitOps Update
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com

          git add helm/sample-service/values-prod.yaml

          git commit -m \
          "release: image ${{ steps.vars.outputs.sha }}" || true

          git push