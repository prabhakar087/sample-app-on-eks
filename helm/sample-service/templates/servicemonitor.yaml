{{- if .Values.serviceMonitor.enabled }}

apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor

metadata:
  name: {{ include "sample.fullname" . }}
  namespace: monitoring

  labels:
    release: monitoring

spec:

  namespaceSelector:
    matchNames:
      - {{ .Release.Namespace }}

  selector:
    matchLabels:
      app: {{ include "sample.name" . }}

  endpoints:
    - port: http
      path: /metrics
      interval: 30s
      scrapeTimeout: 10s

{{- end }}