apiVersion: v1
kind: Service

metadata:
  name: {{ include "sample.fullname" . }}

  labels:
    app: {{ include "sample.name" . }}

spec:

  type: {{ .Values.service.type }}

  selector:
    app: {{ include "sample.name" . }}

  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.targetPort }}
      protocol: TCP