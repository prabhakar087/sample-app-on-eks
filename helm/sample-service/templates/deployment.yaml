apiVersion: apps/v1
kind: Deployment

metadata:
  name: {{ include "sample.fullname" . }}

spec:
  replicas: {{ .Values.replicaCount }}

  strategy:
    type: RollingUpdate

    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0

  selector:
    matchLabels:
      app: {{ include "sample.name" . }}

  template:

    metadata:
      labels:
        app: {{ include "sample.name" . }}

      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"

    spec:

      serviceAccountName: {{ include "sample.fullname" . }}

      containers:
        - name: app

          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"

          imagePullPolicy: {{ .Values.image.pullPolicy }}

          ports:
            - containerPort: 8080

          resources:
{{ toYaml .Values.resources | indent 12 }}

          securityContext:
{{ toYaml .Values.securityContext | indent 12 }}

          livenessProbe:
            httpGet:
              path: /health
              port: 8080

            initialDelaySeconds: 15
            periodSeconds: 15

          readinessProbe:
            httpGet:
              path: /ready
              port: 8080

            initialDelaySeconds: 5
            periodSeconds: 10

          lifecycle:
            preStop:
              exec:
                command:
                  - sh
                  - -c
                  - sleep 10