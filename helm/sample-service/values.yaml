replicaCount: 2

image:
  repository: ghcr.io/your-org/sample-service
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 80
  targetPort: 8080

ingress:
  enabled: true
  className: nginx

  annotations: {}

  hosts:
    - host: sample.local
      paths:
        - path: /
          pathType: Prefix

resources:
  requests:
    cpu: 100m
    memory: 128Mi

  limits:
    cpu: 500m
    memory: 256Mi

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 10

  cpuUtilization: 70

podDisruptionBudget:
  minAvailable: 1

serviceMonitor:
  enabled: true

networkPolicy:
  enabled: true

securityContext:
  runAsNonRoot: true
  runAsUser: 1000
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true

externalSecrets:
  enabled: false