apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  name: platform-root
  namespace: argocd

spec:
  project: default

  source:
    repoURL: https://github.com/your-org/devops-onboarding.git # change it to the correct repo URL
    targetRevision: main
    path: gitops

  destination:
    server: https://kubernetes.default.svc
    namespace: argocd

  syncPolicy:
    automated:
      prune: true
      selfHeal: true

    syncOptions:
      - CreateNamespace=true