apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  name: sample-service-dev
  namespace: argocd

spec:

  project: default

  source:
    repoURL: https://github.com/your-org/devops-onboarding.git
    targetRevision: main

    path: helm/sample-service

    helm:
      valueFiles:
        - values-dev.yaml

  destination:
    server: https://kubernetes.default.svc
    namespace: sample-service-dev

  syncPolicy:
    automated:
      prune: true
      selfHeal: true

    syncOptions:
      - CreateNamespace=true