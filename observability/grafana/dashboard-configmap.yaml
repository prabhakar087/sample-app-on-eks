apiVersion: v1
kind: ConfigMap

metadata:
  name: sample-service-dashboard
  namespace: monitoring

  labels:
    grafana_dashboard: "1"

data:

  sample-service-dashboard.json: |
    {
      "annotations": {
        "list": []
      },
      "editable": true,
      "panels": [
        {
          "id": 1,
          "title": "Request Rate",
          "type": "timeseries",
          "targets": [
            {
              "expr": "sum(rate(http_requests_total[5m]))",
              "refId": "A"
            }
          ]
        },
        {
          "id": 2,
          "title": "5xx Error Rate",
          "type": "timeseries",
          "targets": [
            {
              "expr": "sum(rate(http_requests_total{status=~\"5..\"}[5m]))",
              "refId": "A"
            }
          ]
        },
        {
          "id": 3,
          "title": "P95 Latency",
          "type": "timeseries",
          "targets": [
            {
              "expr": "histogram_quantile(0.95,sum(rate(http_request_duration_seconds_bucket[5m])) by (le))",
              "refId": "A"
            }
          ]
        }
      ],
      "schemaVersion": 39,
      "title": "Sample Service Dashboard",
      "version": 1
    }